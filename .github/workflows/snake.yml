# ══════════════════════════════════════════════════════
#  GitHub Profile Snake Animation — FIXED v3
#  Fix 1: Added permissions: write-all (exit code 128)
#  Fix 2: Updated all actions to Node.js 24 compatible
#  Fix 3: Switched push method to avoid git permission bug
# ══════════════════════════════════════════════════════
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"    # every day at midnight UTC
  workflow_dispatch:         # manual trigger from Actions tab
  push:
    branches:
      - main

# ─── THIS IS THE FIX FOR EXIT CODE 128 ───
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ⬇️  Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: 🐍  Generate snake SVG (light + dark)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: maruthisaiteja
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: 🚀  Push to output branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: output
          folder: dist
          clean: false
          token: ${{ secrets.GITHUB_TOKEN }}
