# ══════════════════════════════════════════════════════
#  GitHub Profile Snake Animation Generator
#  Runs daily at midnight + on every push to main
#  Output: /output/github-snake.svg + github-snake-dark.svg
# ══════════════════════════════════════════════════════
name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"      # every day at midnight UTC
  workflow_dispatch:          # manual trigger from Actions tab
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️  Checkout repo
        uses: actions/checkout@v4

      - name: 🐍  Generate snake (light theme)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: maruthisaiteja
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      - name: 🚀  Push output to branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
